<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTION CLOUD - 雲端收藏管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <!-- 導航列 -->
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b shadow-sm px-4 py-3">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white">
                        <i class="fas fa-box-open"></i>
                    </div>
                    <h1 class="text-lg font-black tracking-tight text-gray-800">COLLECTION CLOUD</h1>
                </div>
                <div id="user-mobile-actions" class="hidden">
                    <button onclick="handleLogout()" class="text-gray-400 p-2 hover:text-red-500 transition-colors">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div id="nav-actions" class="flex items-center gap-3">
                <!-- 登入按鈕或搜尋框會在此動態渲染 -->
                <button onclick="handleGoogleLogin()" id="login-btn" class="flex items-center gap-2 bg-white border border-gray-300 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-50 shadow-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                    使用 Google 登入
                </button>
            </div>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 mt-6 hidden">
        <!-- 數據概覽 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-container">
            <!-- 動態插入數據卡片 -->
        </div>

        <!-- 類別篩選 -->
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar" id="category-filters">
            <!-- 動態插入篩選按鈕 -->
        </div>

        <!-- 收藏牆 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-4" id="items-grid">
            <!-- 動態插入收藏卡片 -->
        </div>
    </main>

    <!-- 未登入畫面 -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 p-8 text-center bg-white rounded-[3rem] shadow-xl border border-gray-100">
        <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-cube fa-2x"></i>
        </div>
        <h2 class="text-2xl font-black text-gray-800 mb-2">雲端收藏盒</h2>
        <p class="text-gray-500 mb-8 text-sm">請先登入以同步您的數位收藏庫。</p>
        <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all shadow-lg">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
            立即使用 Google 登入
        </button>
    </div>

    <!-- 新增視窗 Modal -->
    <div id="add-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-md hidden">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg max-h-[90vh] overflow-y-auto p-8 shadow-2xl relative">
            <button onclick="toggleAddModal(false)" class="absolute top-6 right-6 p-2 text-gray-400 hover:bg-gray-100 rounded-full">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="text-2xl font-black mb-8">新增收藏</h2>
            <form id="add-item-form" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1">物品名稱</label>
                    <input type="text" id="form-name" required class="w-full p-4 bg-gray-50 border-none rounded-2xl font-medium focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="輸入名稱...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-black text-gray-400 uppercase ml-1">類別</label>
                        <select id="form-category" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-medium outline-none">
                            <option value="公仔模型">公仔模型</option>
                            <option value="卡牌">卡牌</option>
                            <option value="書籍/漫畫">書籍/漫畫</option>
                            <option value="電子產品">電子產品</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-black text-gray-400 uppercase ml-1">保存狀態</label>
                        <select id="form-status" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-medium outline-none">
                            <option value="全新">全新</option>
                            <option value="近新">近新</option>
                            <option value="良品">良品</option>
                            <option value="有損">有損</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-black text-gray-400 uppercase ml-1">單價 (TWD)</label>
                        <input type="number" id="form-price" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-medium outline-none" value="0">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-black text-gray-400 uppercase ml-1">數量</label>
                        <input type="number" id="form-quantity" class="w-full p-4 bg-gray-50 border-none rounded-2xl font-medium outline-none" value="1">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1">照片來源</label>
                    <div class="flex gap-2 p-1 bg-gray-50 rounded-2xl">
                        <button type="button" onclick="setImageSource('upload')" id="src-upload-btn" class="flex-1 py-2 rounded-xl text-xs font-bold bg-indigo-600 text-white transition-all">本機上傳</button>
                        <button type="button" onclick="setImageSource('url')" id="src-url-btn" class="flex-1 py-2 rounded-xl text-xs font-bold text-gray-400 transition-all">圖片網址</button>
                    </div>
                    <div id="image-upload-area" class="mt-3">
                        <input type="file" id="form-file" accept="image/*" class="block w-full text-xs text-gray-400">
                    </div>
                    <div id="image-url-area" class="mt-3 hidden">
                        <input type="url" id="form-url" placeholder="https://..." class="w-full p-4 bg-gray-50 border-none rounded-2xl font-medium outline-none">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95">確定儲存</button>
            </form>
        </div>
    </div>

    <!-- 燈箱視窗 -->
    <div id="lightbox" class="fixed inset-0 z-[60] bg-black/95 hidden items-center justify-center p-4 cursor-pointer" onclick="this.classList.add('hidden')">
        <img id="lightbox-img" src="" class="max-w-full max-h-full object-contain rounded-2xl shadow-2xl">
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDdbNAzTGWsZfob_CR5lCXP5yKbctbtFVA",
            authDomain: "collection-6049b.firebaseapp.com",
            projectId: "collection-6049b",
            storageBucket: "collection-6049b.firebasestorage.app",
            messagingSenderId: "829552075224",
            appId: "1:829552075224:web:5ac93987a43e9a2192d2ad"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = "collection-manager";

        // 全域狀態
        let currentUser = null;
        let items = [];
        let currentImageSource = 'upload';
        let base64Image = '';
        let categoryFilter = 'All';

        // 初始化監聽
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-mobile-actions').classList.remove('hidden');
                renderNav();
                listenToData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('user-mobile-actions').classList.add('hidden');
                renderLoginBtn();
            }
        });

        // --- 功能函數 ---

        window.handleGoogleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login Error", error);
            }
        };

        window.handleLogout = () => signOut(auth);

        window.toggleAddModal = (show) => {
            document.getElementById('add-modal').classList.toggle('hidden', !show);
        };

        window.setImageSource = (src) => {
            currentImageSource = src;
            document.getElementById('src-upload-btn').className = src === 'upload' ? 'flex-1 py-2 rounded-xl text-xs font-bold bg-indigo-600 text-white transition-all' : 'flex-1 py-2 rounded-xl text-xs font-bold text-gray-400 transition-all';
            document.getElementById('src-url-btn').className = src === 'url' ? 'flex-1 py-2 rounded-xl text-xs font-bold bg-indigo-600 text-white transition-all' : 'flex-1 py-2 rounded-xl text-xs font-bold text-gray-400 transition-all';
            document.getElementById('image-upload-area').classList.toggle('hidden', src !== 'upload');
            document.getElementById('image-url-area').classList.toggle('hidden', src !== 'url');
        };

        // 監聽檔案選擇轉 Base64
        document.getElementById('form-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => { base64Image = reader.result; };
                reader.readAsDataURL(file);
            }
        });

        // 提交表單
        document.getElementById('add-item-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const finalImageUrl = currentImageSource === 'upload' ? base64Image : document.getElementById('form-url').value;

            const itemData = {
                name: document.getElementById('form-name').value,
                category: document.getElementById('form-category').value,
                price: Number(document.getElementById('form-price').value) || 0,
                quantity: Number(document.getElementById('form-quantity').value) || 1,
                status: document.getElementById('form-status').value,
                imageUrl: finalImageUrl || 'https://via.placeholder.com/400?text=No+Image',
                rating: 5,
                createdAt: new Date().toISOString()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'collections');
                await addDoc(colRef, itemData);
                toggleAddModal(false);
                e.target.reset();
                base64Image = '';
            } catch (err) {
                console.error("Add Error", err);
            }
        };

        window.handleDelete = async (id) => {
            if (!confirm('確定要刪除？')) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'collections', id));
        };

        window.openLightbox = (url) => {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = url;
            lb.classList.remove('hidden');
            lb.classList.add('flex');
        };

        window.setCategoryFilter = (cat) => {
            categoryFilter = cat;
            renderItems();
            renderCategories();
        };

        // --- 渲染函數 ---

        function renderNav() {
            const container = document.getElementById('nav-actions');
            container.innerHTML = `
                <div class="relative flex-1 md:w-64">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    <input type="text" id="search-input" placeholder="搜尋..." class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-full text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button onclick="toggleAddModal(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white p-2.5 rounded-full shadow-lg transition-transform active:scale-95">
                    <i class="fas fa-plus"></i>
                </button>
                <button onclick="handleLogout()" class="hidden md:block text-gray-400 p-2 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            `;
            document.getElementById('search-input').oninput = (e) => {
                renderItems(e.target.value);
            };
        }

        function renderLoginBtn() {
            document.getElementById('nav-actions').innerHTML = `
                <button onclick="handleGoogleLogin()" class="flex items-center gap-2 bg-white border border-gray-300 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-50 shadow-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                    使用 Google 登入
                </button>
            `;
        }

        function listenToData() {
            const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'collections');
            onSnapshot(query(colRef), (snapshot) => {
                items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderStats();
                renderCategories();
                renderItems();
            });
        }

        function renderStats() {
            const totalValue = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalCount = items.reduce((sum, item) => sum + item.quantity, 0);
            const statsHtml = `
                <div class="bg-gradient-to-br from-indigo-600 to-violet-700 p-5 rounded-3xl text-white shadow-xl shadow-indigo-200">
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">總市值 (TWD)</p>
                    <h2 class="text-2xl font-black">$${totalValue.toLocaleString()}</h2>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                    <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">物品總數</p>
                    <h2 class="text-2xl font-black text-gray-800">${totalCount} <span class="text-xs font-normal text-gray-400">Items</span></h2>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm hidden md:block">
                    <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">收藏類別</p>
                    <h2 class="text-2xl font-black text-gray-800">${new Set(items.map(i => i.category)).size} <span class="text-xs font-normal text-gray-400">Types</span></h2>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                    <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">活躍度</p>
                    <h2 class="text-2xl font-black text-gray-800">${items.length} <span class="text-xs font-normal text-gray-400">Records</span></h2>
                </div>
            `;
            document.getElementById('stats-container').innerHTML = statsHtml;
        }

        function renderCategories() {
            const cats = ['All', ...new Set(items.map(i => i.category))];
            const catHtml = cats.map(cat => `
                <button onclick="setCategoryFilter('${cat}')" class="px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all ${categoryFilter === cat ? 'bg-gray-800 text-white' : 'bg-white border border-gray-200 text-gray-500'}">
                    ${cat === 'All' ? '✨ 全部' : cat}
                </button>
            `).join('');
            document.getElementById('category-filters').innerHTML = catHtml;
        }

        function renderItems(search = '') {
            const grid = document.getElementById('items-grid');
            const filtered = items.filter(i => {
                const matchSearch = i.name.toLowerCase().includes(search.toLowerCase());
                const matchCat = categoryFilter === 'All' || i.category === categoryFilter;
                return matchSearch && matchCat;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-300">目前沒有相關紀錄</div>`;
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <div class="group bg-white rounded-[2rem] border border-gray-100 overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
                    <div class="relative aspect-[4/5] bg-gray-50 overflow-hidden">
                        <img src="${item.imageUrl}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=No+Image'">
                        <div class="absolute top-4 left-4">
                            <span class="px-3 py-1 bg-white/90 backdrop-blur shadow-sm text-[10px] font-bold rounded-full text-indigo-600">${item.category}</span>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent flex items-end p-6 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openLightbox('${item.imageUrl}')" class="w-full bg-white/20 backdrop-blur-md text-white py-2 rounded-xl text-xs font-bold border border-white/30">查看大圖</button>
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="font-black text-gray-800 leading-tight mb-2 truncate">${item.name}</h3>
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-[10px] font-bold text-gray-400 px-2 py-0.5 bg-gray-50 rounded">${item.status}</span>
                        </div>
                        <div class="flex items-center justify-between border-t border-gray-50 pt-4">
                            <div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">總估值</p>
                                <p class="font-black text-indigo-600 text-lg">$${(item.price * item.quantity).toLocaleString()}</p>
                            </div>
                            <button onclick="handleDelete('${item.id}')" class="p-2 text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
